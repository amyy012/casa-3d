
 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Visor RA</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>
body{
    margin:0;
    height:100vh;
}

model-viewer{
    width:100%;
    height:100%;
}

.ar-button{
    background:#007bff;
    color:white;
    border:none;
    padding:14px 28px;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
}
</style>

</head>
<body>

<model-viewer
    src="casa.glb"
    ios-src="casa.usdz"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1">

    <button slot="ar-button" class="ar-button">
        Ver en mi espacio (RA)
    </button>

</model-viewer>

</body>
</html>
